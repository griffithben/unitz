name: Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get merged PR labels
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              base: 'main',
              sort: 'updated',
              direction: 'desc',
              per_page: 10
            });

            const merged = pulls.find(pr => pr.merge_commit_sha === context.sha);

            if (!merged) {
              console.log('No merged PR found for this commit — skipping release.');
              core.setOutput('bump', 'none');
              return;
            }

            console.log(`Found PR #${merged.number}: ${merged.title}`);
            const labels = merged.labels.map(l => l.name);
            console.log('Labels:', labels);

            if (labels.includes('major')) {
              core.setOutput('bump', 'major');
            } else if (labels.includes('minor')) {
              core.setOutput('bump', 'minor');
            } else if (labels.includes('patch')) {
              core.setOutput('bump', 'patch');
            } else {
              console.log('No version label (major/minor/patch) found — skipping release.');
              core.setOutput('bump', 'none');
            }

      - name: Get latest tag
        id: latest_tag
        if: steps.pr.outputs.bump != 'none'
        run: |
          git fetch --tags
          LATEST=$(git tag -l '[0-9]*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST" ]; then
            LATEST="0.0.0"
          fi
          echo "Latest tag: $LATEST"
          echo "tag=$LATEST" >> $GITHUB_OUTPUT

      - name: Calculate new version
        id: version
        if: steps.pr.outputs.bump != 'none'
        run: |
          BUMP="${{ steps.pr.outputs.bump }}"
          VERSION="${{ steps.latest_tag.outputs.tag }}"

          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW"
          echo "tag=$NEW" >> $GITHUB_OUTPUT

      - name: Create tag and GitHub release
        if: steps.pr.outputs.bump != 'none'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.version.outputs.tag }}';

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Unitz ${tag}`,
              generate_release_notes: true
            });

            console.log(`Released ${tag}`);